version: "3.8"

services:

  minio:
    image: minio/minio
    container_name: v2.minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../minio_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: v2.clickhouse
    ports:
      - "8123:8123" #HTTP Port
      - "9002:9000" #TCP Port
    volumes:
      - ../clickhouse_config:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: contabilizei
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: password123
    depends_on:
      minio:
        condition: service_started
